<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Pantry Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Shared Pantry Tracker</h1>
            <p class="subtitle">Track your shared supplies at a glance</p>
            <div id="connectionStatus" class="connection-status disconnected">● Connecting...</div>
        </header>

        <section class="shopping-list-section">
            <h2>🛒 Shopping List</h2>
            <div id="shoppingList" class="shopping-list">
                <p class="empty-message">All items are well stocked!</p>
            </div>
        </section>

        <section class="add-product-section">
            <h2>Add New Product</h2>
            <form id="addProductForm" class="add-form">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="e.g., Milk" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="productQuantity">Starting Quantity</label>
                        <input type="number" id="productQuantity" min="0" value="5" required>
                    </div>
                    <div class="form-group">
                        <label for="productMaxQuantity">Max Quantity</label>
                        <input type="number" id="productMaxQuantity" min="0" value="10" required>
                    </div>
                    <div class="form-group">
                        <label for="productThreshold">Threshold</label>
                        <input type="number" id="productThreshold" min="0" value="1" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Add Product</button>
            </form>
        </section>

        <section class="products-section">
            <h2>All Products</h2>
            <div id="productsList" class="products-list">
                <p class="loading">Loading products...</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
